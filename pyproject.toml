[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "G", "W"]
ignore = [
    "E402",  # matplotlib.use("Agg") requires imports after call
    "B008",  # function call in default argument (used in Pydantic validators)
]

[tool.ruff.lint.per-file-ignores]
"src/live/main.py" = ["I001"]
"src/backtest/optimize.py" = ["I001"]
"src/backtest/universe_bt.py" = ["I001"]

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
check_untyped_defs = true
warn_return_any = true
